<a [href]="url">
    <span id="main-content">
        <span id="title"><slot name="title"></slot></span>
        <span>
            <slot></slot>
        </span>
    </span>
    <span id="footer"><slot name="footer"></slot></span>
</a>
<style>
    :host {
        display: flex;
        justify-content: stretch;
        align-items: stretch;
    }
    a {
        border-radius: 5px;
        background-color: rgb(247, 235, 216);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px;
        text-decoration: none;
        color: black;
        width: 200px;
    }

    span {
        margin: 1px;
        display: block;
    }

    #title {
        font-weight: bold;
    }

    #title::after {
        padding-left: 5px;
        content: '→';
    }

    #main-content {
        display: flex;
        flex-direction: column;
        padding-bottom: 5px;
    }

    #footer {
        justify-self: end;
    }
</style>
